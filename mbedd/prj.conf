CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="AmuletMlotThora"
CONFIG_BT_SMP=y
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_BUF_ACL_TX_SIZE=251

# Device Information Service (DIS)
CONFIG_BT_DIS=y
CONFIG_BT_DIS_MODEL_NUMBER_STR="Amulet 1.0"
CONFIG_BT_DIS_MANUF_NAME_STR="Nordic Semiconductor"

# Logging, Float, ADC, GPIO
CONFIG_LOG=y
CONFIG_BT_LOG_LEVEL_INF=y
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_GPIO=y
CONFIG_ADC=y
CONFIG_CBPRINTF_FP_SUPPORT=y
CONFIG_FPU=y

# Internal Temp Sensor
CONFIG_SENSOR=y
CONFIG_TEMP_NRF5=y

# Buzzer PWM
CONFIG_PWM=y
CONFIG_PWM_NRFX=y
