version: "3.8"

services:
  # ── MQTT Broker ──────────────────────────────────────────────
  # Nasłuchuje na 0.0.0.0 → dostępny z każdej maszyny w sieci/VPN
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: mqtt-broker
    ports:
      - "0.0.0.0:1883:1883" # MQTT — dostępny z sieci VPN
      - "0.0.0.0:9001:9001" # WebSocket — dostępny z sieci VPN
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    restart: unless-stopped
    networks:
      - mqtt-network

  # Publisher nie jest potrzebny — dane przychodzą z zewnętrznego serwera kolegi

  # ── Subscriber (odbiorca wiadomości) ─────────────────────────
  subscriber:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mqtt-subscriber
    command: python subscriber.py
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - MQTT_TOPICS=nrf54/data,mlottora/data
    depends_on:
      - mosquitto
    restart: unless-stopped
    networks:
      - mqtt-network

networks:
  mqtt-network:
    driver: bridge
